<!doctype html>
<html lang="en" data-api-base-url="/api">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CF Boilerplate</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: rgba(18, 24, 43, 0.88);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #7dd3fc;
        --shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 32%),
          linear-gradient(160deg, #050816 0%, var(--bg) 45%, #0f172a 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 640px);
        padding: 40px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.78rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 4.6rem);
        line-height: 0.95;
      }

      p {
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
      }

      .status {
        margin-top: 28px;
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.56);
        color: var(--text);
        min-height: 56px;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .log {
        margin: 20px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .log li {
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.45);
        color: var(--muted);
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        color: #020617;
        background: linear-gradient(135deg, #7dd3fc 0%, #a78bfa 100%);
        cursor: pointer;
      }

      code {
        color: #bae6fd;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Cloudflare Pages</p>
      <h1>Hello from Cloudflare</h1>
      <p>
        This starter keeps the hello-world feel while exercising D1, KV, R2,
        and Queue through a tiny Worker API.
      </p>
      <div class="status" id="status" aria-live="polite">Loading greeting…</div>
      <div class="actions">
        <button id="reload" type="button">Reload greeting</button>
        <button id="save-r2" type="button">Save R2 note</button>
        <button id="send-queue" type="button">Send queue job</button>
      </div>
      <ul class="log" id="log" aria-live="polite"></ul>
    </main>
    <script>
      const status = document.getElementById("status");
      const reload = document.getElementById("reload");
      const saveR2 = document.getElementById("save-r2");
      const sendQueue = document.getElementById("send-queue");
      const log = document.getElementById("log");
      const apiBaseUrl = document.documentElement.dataset.apiBaseUrl || "/api";
      const apiRoot = apiBaseUrl.replace(/\/$/, "");
      const apiHelloUrl = `${apiRoot}/hello?name=Cloudflare`;
      const apiR2Url = `${apiRoot}/demo/r2/pages.txt`;
      const apiQueueUrl = `${apiRoot}/demo/queue`;

      function appendLog(line) {
        const item = document.createElement("li");
        item.textContent = line;
        log.prepend(item);
      }

      async function loadGreeting() {
        status.textContent = "Loading greeting…";

        try {
          const response = await fetch(apiHelloUrl);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          status.innerHTML = `API says: <code>${data.message}</code> · source <code>${data.source}</code>`;
          appendLog(`Greeting visits: ${data.visits}`);
        } catch (error) {
          const message =
            error instanceof Error ? error.message : "Unknown error";
          status.textContent = `API unavailable: ${message}`;
        }
      }

      async function saveR2Note() {
        try {
          const response = await fetch(apiR2Url, {
            method: "PUT",
            body: "Hello from Pages.",
          });
          const data = await response.json();
          appendLog(`R2 saved ${data.key} (${data.size} bytes)`);
        } catch (error) {
          const message =
            error instanceof Error ? error.message : "Unknown error";
          appendLog(`R2 error: ${message}`);
        }
      }

      async function sendQueueJob() {
        try {
          const response = await fetch(apiQueueUrl, {
            method: "POST",
            headers: {
              "content-type": "application/json",
            },
            body: JSON.stringify({ name: "Pages" }),
          });
          const data = await response.json();
          appendLog(`Queue job ${data.job.id} queued`);
        } catch (error) {
          const message =
            error instanceof Error ? error.message : "Unknown error";
          appendLog(`Queue error: ${message}`);
        }
      }

      reload.addEventListener("click", loadGreeting);
      saveR2.addEventListener("click", saveR2Note);
      sendQueue.addEventListener("click", sendQueueJob);
      loadGreeting();
    </script>
  </body>
</html>
