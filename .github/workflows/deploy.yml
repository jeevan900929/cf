name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      pages: ${{ steps.filter.outputs.pages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'src/**'
              - 'shared/**'
              - 'wrangler.jsonc'
              - 'migrations/**'
              - 'scripts/deploy-worker.mjs'
              - 'scripts/utils.mjs'
              - 'infra/**'
              - '.github/workflows/**'
            pages:
              - 'pages/**'
              - 'shared/**'
              - 'scripts/deploy-pages.mjs'
              - 'scripts/utils.mjs'
              - 'infra/**'
              - '.github/workflows/**'

  test:
    needs: changes
    if: needs.changes.outputs.worker == 'true' || needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  infra:
    needs: [changes, test]
    if: needs.changes.outputs.worker == 'true' || needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    outputs:
      stack_outputs: ${{ steps.get_outputs.outputs.json }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pulumi/auth-actions@v1
        with:
          organization: jeevanraj-angamuthu-ext-sadhguru-org
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:jeevanraj-angamuthu-ext-sadhguru-org
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: jeevanraj-angamuthu-ext-sadhguru-org/cf-boilerplate-infra/prod
          work-dir: infra/pulumi
      - id: get_outputs
        working-directory: infra/pulumi
        run: |
          {
            echo 'json<<EOF'
            pulumi stack output --json
            echo EOF
          } >> $GITHUB_OUTPUT

  deploy-worker:
    needs: [changes, infra]
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PULUMI_OUTPUTS_JSON: ${{ needs.infra.outputs.stack_outputs }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run deploy:worker

  deploy-pages:
    needs: [changes, infra]
    if: needs.changes.outputs.pages == 'true'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_API_WORKER_URL: ${{ secrets.CF_API_WORKER_URL }}
      PULUMI_OUTPUTS_JSON: ${{ needs.infra.outputs.stack_outputs }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run deploy:pages
