name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Pulumi
        uses: pulumi/auth-actions@v1
        with:
          organization: jeevanraj-angamuthu-ext-sadhguru-org
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:jeevanraj-angamuthu-ext-sadhguru-org

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test && npm run typecheck

      - name: Apply Pulumi stack
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: jeevanraj-angamuthu-ext-sadhguru-org/cf-boilerplate-infra/prod
          work-dir: infra/pulumi

      - name: Deploy Worker
        run: npm run deploy:prod
